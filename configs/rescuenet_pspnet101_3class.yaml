# RescueNet 3-class: Sadece bina (Others, Building-Light, Building-Heavy)
# Yol/su/araç/vb. hepsi Others. Maksimum bina doğruluğu hedefi.

DATA:
  data_root: /kaggle/input/rescuenet
  num_classes: 3
  use_reduced_3class: true

  # Sadece bina etiketi olan görüntüler: önce scripts/build_building_list.py çalıştır, sonra bu yolu ver
  # building_only_list_dir: /kaggle/working/building_lists

  # Loss: Others düşük, bina yüksek (Building-Heavy en kritik)
  class_weights: [0.4, 1.3, 1.5]

  # Best model = sadece Building-Light + Building-Heavy mIoU
  important_class_ids: [1, 2]

  # Gradient sadece bina piksellerinde (Others yok)
  loss_only_on_important: true

  class_names:
    - Others
    - Building-Light
    - Building-Heavy

  color_map:
    - [0,   0,   0]    # 0 Others
    - [180, 180, 120]  # 1 Building-Light
    - [255, 0,   0]    # 2 Building-Heavy

TRAIN:
  arch: pspnet_resnet101
  # 713 (makale) veya 1024 (daha az resize kaybı; batch_size 2 yap, VRAM kontrol et)
  train_h: 713
  train_w: 713
  scale_min: 0.5
  scale_max: 2.0
  rotate_min: -10
  rotate_max: 10
  ignore_label: 255
  workers: 4
  batch_size: 4
  batch_size_val: 2
  use_amp: true
  base_lr: 0.001
  momentum: 0.9
  weight_decay: 0.00001
  epochs: 120
  start_epoch: 0
  power: 0.9
  early_stopping_patience: 40
  print_freq: 50
  save_freq: 1
  save_path: /kaggle/working/checkpoints_pspnet_3class
  resume: ""

  use_dice_ce: true
  dice_weight: 0.6

TEST:
  test_h: 713
  test_w: 713
  model_path: ""
  save_folder: /kaggle/working/predictions_pspnet_3class
